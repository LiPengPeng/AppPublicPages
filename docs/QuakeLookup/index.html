<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>震情速查</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; background: #07111f; color: #eef4ff; line-height: 1.75; }
    main { max-width: 920px; margin: 0 auto; padding: 48px 18px 72px; }
    .hero { padding: 30px; border: 1px solid rgba(118, 166, 255, .28); background: rgba(255,255,255,.05); border-radius: 14px; }
    h1 { margin: 0 0 12px; font-size: 2.2rem; line-height: 1.15; }
    h2 { margin-top: 34px; color: #7fb0ff; }
    p { margin: 0 0 14px; }
    a { color: #9ec5ff; }
    .muted { color: rgba(238,244,255,.72); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-top: 18px; }
    .card { padding: 16px; background: rgba(255,255,255,.06); border-radius: 12px; border: 1px solid rgba(255,255,255,.08); }
    footer { margin-top: 42px; color: rgba(238,244,255,.58); font-size: .92rem; }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>震情速查</h1>
      <p class="muted">哪里地震了，离我多远，严不严重，关注地点有没有事，一眼看清。</p>
      <p>震情速查是一款面向日常查询的地震信息工具，提供最新震情、地图、关注地点、详情与应急知识，数据来自公开地震数据源。</p>
    </section>

    <h2>核心功能</h2>
    <div class="grid">
      <div class="card">最新地震列表</div>
      <div class="card">附近震情优先</div>
      <div class="card">地图查看点位</div>
      <div class="card">关注地点提醒</div>
      <div class="card">震情详情</div>
      <div class="card">应急知识</div>
    </div>

    <h2>说明</h2>
    <p class="muted">本 App 展示公开地震信息，不提供地震预测，也不是官方地震预警工具。请以当地政府、应急管理部门和官方地震机构发布的信息为准。</p>

    <h2>链接</h2>
    <p><a href="./privacy.html">隐私政策</a> · <a href="./support.html">技术支持</a></p>

    <footer>© 2026 Quake Lookup</footer>
  </main>
</body>
</html>
