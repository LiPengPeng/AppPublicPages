<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Public Pages</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif; background: #f7f7f4; color: #1f2328; line-height: 1.7; }
    main { max-width: 840px; margin: 0 auto; padding: 48px 18px 72px; }
    h1 { margin: 0 0 8px; font-size: 2rem; line-height: 1.2; }
    p { margin: 0 0 18px; }
    a { color: #0969da; }
    .muted { color: #59636e; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; margin-top: 24px; }
    .card { display: block; padding: 18px; background: #fff; border: 1px solid #d8dee4; border-radius: 10px; text-decoration: none; color: inherit; }
    .card strong { display: block; margin-bottom: 6px; }
    footer { margin-top: 42px; color: #6e7781; font-size: .92rem; }
  </style>
</head>
<body>
  <main>
    <h1>App Public Pages</h1>
    <p class="muted">Public privacy policies, support pages, and marketing pages for independent apps.</p>

    <div class="grid">
      <a class="card" href="./goaloracle/">
        <strong>GoalOracle by FotMatch</strong>
        <span>Football matchday entertainment, privacy policy, and support.</span>
      </a>
      <a class="card" href="./choosely/">
        <strong>小决定 Choosely</strong>
        <span>转盘决策小工具，隐私政策、用户协议与技术支持。</span>
      </a>
      <a class="card" href="./vibecode/">
        <strong>VibeCode</strong>
        <span>AI 编程与 iOS 独立开发课程，隐私政策、用户协议与技术支持。</span>
      </a>
    </div>

    <footer>© 2026 LiPengPeng</footer>
  </main>
</body>
</html>
